<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Salon Work Pro - ログイン</title>

	<link rel="stylesheet" th:href="@{/css/scr001/login.css}">

</head>

<body>

	<div class="login-container">

		<div class="login-card">

			<div class="logo-area">
				<h1>Salon Work Pro</h1>
				<p>サロン業務管理システム</p>
			</div>

			<form id="loginForm" th:action="@{/login}" method="post">

				<div class="form-group">

					<label for="loginId">
						ログインID
					</label>

					<input type="text" id="loginId" name="loginId" maxlength="20" placeholder="ログインIDを入力"
						autocomplete="username" required>

				</div>

				<div class="form-group">

					<label for="password">
						パスワード
					</label>

					<input type="password" id="password" name="password" maxlength="100" placeholder="パスワードを入力"
						autocomplete="current-password" required>

				</div>

				<div class="button-area">

					<button type="submit" class="login-button">

						ログイン

					</button>

				</div>

				<div class="error-message" th:if="${errorMessage}">

					<span th:text="${errorMessage}"></span>

				</div>

			</form>

		</div>

	</div>

	<script th:src="@{/js/scr001/login.js}"></script>

</body>

</html>
