<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">

	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<title>
		Salon Work Pro - 予約管理
	</title>

	<link rel="stylesheet" th:href="@{/css/scr003/reservation.css}">
</head>

<body>

	<div class="screen">

		<!-- ヘッダー -->

		<header class="app-header">

			<button class="btn-menu" onclick="location.href='/scr002'">

				← メニュー

			</button>

			<h1>

				予約管理

			</h1>

			<button class="btn-add" onclick="openCreateModal()">

				＋新規予約

			</button>

		</header>

		<!-- 日付切替 -->

		<section class="date-nav">

			<input type="hidden" id="targetDate" th:value="${targetDate}">

			<button class="nav-button" onclick="changeDate(-1)">
				◀
			</button>

			<span id="currentDate" th:text="${displayDate}">
			</span>

			<button class="nav-button" onclick="changeDate(1)">
				▶
			</button>

		</section>

		<!-- タイムテーブル -->

		<section class="timetable-container">

			<table class="timetable">

				<thead>

					<tr>

						<th>
							時間
						</th>

						<th>
							予約状況
						</th>

					</tr>

				</thead>

				<tbody>

					<tr th:each="row : ${reservationTable}" th:onclick="
				            ${row.available}
				            ?
				            'openCreateModal('''
				            + ${row.time}
				            + ''')'
				            :
				            'openEditModal('
				            + ${row.reservationId}
				            + ')'
				        ">

						<!-- 時間 -->

						<td th:text="${row.time}">

							09:00

						</td>

						<!-- 空き枠 -->

						<td th:if="${row.available}" class="empty">

							＋ 空き枠

						</td>

						<!-- 予約あり -->

						<td th:unless="${row.available}" class="reserved">

							<div th:if="${!row.continuation}">

								<div th:text="${row.customerName}
						                     + '様'">
								</div>

								<div th:text="${row.menuName}">
								</div>

							</div>

							<div th:if="${row.continuation}">

								↓

							</div>

						</td>

					</tr>

				</tbody>

			</table>

		</section>

	</div>

	<!-- =================================================
     新規予約モーダル
================================================= -->

	<div id="createModal" class="modal">

		<div class="modal-content">

			<h2>

				新規予約

			</h2>

			<div class="form-group">

				<label>

					開始時間

				</label>

				<input id="createTime" readonly>

			</div>

			<div class="form-group">

				<label>

					顧客

				</label>

				<select id="customerId">

					<option value="">

						選択してください

					</option>

					<option th:each="customer :
                             ${customerList}" th:value="${customer.customerId}" th:text="${customer.customerName}">

						山田太郎

					</option>

				</select>

			</div>

			<div class="form-group">

				<label>

					メニュー

				</label>

				<select id="menuId">

					<option value="">

						選択してください

					</option>

					<option th:each="menu :
                             ${menuList}" th:value="${menu.menuId}" th:text="${menu.menuName}">

						眉毛WAX

					</option>

				</select>

			</div>

			<div class="form-group">

				<label>

					備考

				</label>

				<textarea id="memo"></textarea>

			</div>

			<div class="modal-footer">

				<button onclick="saveReservation()">

					登録

				</button>

				<button onclick="closeCreateModal()">

					閉じる

				</button>

			</div>

		</div>

	</div>

	<!-- =================================================
     編集モーダル
================================================= -->

	<div id="editModal" class="modal">

		<div class="modal-content">

			<h2>

				予約編集

			</h2>

			<input type="hidden" id="reservationId">

			<div class="form-group">

				<label>

					顧客

				</label>

				<input id="editCustomer" readonly>

			</div>

			<div class="form-group">

				<label>

					メニュー

				</label>

				<select id="editMenuId">

					<option th:each="menu :
                             ${menuList}" th:value="${menu.menuId}" th:text="${menu.menuName}">

					</option>

				</select>

			</div>

			<div class="form-group">

				<label>

					備考

				</label>

				<textarea id="editMemo"></textarea>

			</div>

			<div class="modal-footer">

				<button onclick="updateReservation()">

					更新

				</button>

				<button onclick="deleteReservation()">

					削除

				</button>

				<button onclick="closeEditModal()">

					閉じる

				</button>

			</div>

		</div>

	</div>

	<script th:src="@{/js/scr003/reservation.js}">
	</script>

</body>

</html>
