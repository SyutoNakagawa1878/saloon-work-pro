<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>

	<meta charset="UTF-8">

	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<title>顧客管理</title>

	<link rel="stylesheet" th:href="@{/css/scr004/SCR004.css}">

	<script defer th:src="@{/js/scr004/SCR004.js}">
	</script>

</head>

<body>

	<div class="screen">

		<!-- ==========================
         ヘッダー
    =========================== -->

		<header class="app-header">

			<button class="menu-button" type="button" onclick="location.href='/scr002'">

				← メニュー

			</button>

			<h1>

				顧客管理

			</h1>

			<button class="add-button" type="button" onclick="openCreateModal()">

				＋新規顧客

			</button>

		</header>

		<!-- ==========================
         検索
    =========================== -->

	<section class="search-area">

	    <!-- 顧客名 -->
	    <div class="search-row">

	        <label>顧客名</label>

	        <input
	            type="text"
	            id="customerName"
	            placeholder="漢字・フリガナで検索">

	    </div>

		<div class="search-row">

		    <label>性別</label>

		    <div class="checkbox-group">

		        <label>
		            <input
		                type="checkbox"
		                id="male">

		            男性
		        </label>

		        <label>
		            <input
		                type="checkbox"
		                id="female">

		            女性
		        </label>

		        <label>
		            <input
		                type="checkbox"
		                id="other">

		            その他
		        </label>

		    </div>

		</div>

		<div class="search-row">

		    <label>年齢</label>

		    <div class="age-range">

		        <input
		            type="number"
		            id="ageFrom">

		        <span>～</span>

		        <input
		            type="number"
		            id="ageTo">

		    </div>

		</div>

		<div class="search-button-area">

		    <button
		        class="btn-search"
		        type="button"
		        onclick="searchCustomer()">

		        検索

		    </button>

		</div>

	</section>

		<!-- ==========================
         一覧
    =========================== -->

		<section class="table-area">

			<table class="customer-table">

				<tbody>

					<tr th:each="customer : ${customerList}" th:attr="
                        data-id=${customer.customerId}" onclick="openEditModal(this)">

						<td th:text="${customer.customerName}">
						</td>

						<td th:text="${customer.visitCount}">
						</td>

						<td th:text="${customer.lastVisitDate}">
						</td>

					</tr>

				</tbody>

			</table>

		</section>

	</div>

	<!-- ==========================
     新規登録モーダル
=========================== -->

	<div id="createModal" class="modal">

		<div class="modal-container">

			<div class="modal-header">

				<h3>

					新規顧客登録

				</h3>

				<button type="button" onclick="closeCreateModal()">

					×

				</button>

			</div>

			<div class="form-group">

				<label>

					顧客名

				</label>

				<input type="text" id="createCustomerName">

			</div>

			<button class="btn-primary">

				登録

			</button>

		</div>

	</div>

	<!-- ==========================
     編集モーダル
=========================== -->

	<div id="editModal" class="modal">

		<div class="modal-container">

			<div class="modal-header">

				<h3>

					顧客編集

				</h3>

				<button type="button" onclick="closeEditModal()">

					×

				</button>

			</div>

			<input type="hidden" id="customerId">

			<div class="form-group">

				<label>

					顧客名

				</label>

				<input type="text" id="editCustomerName">

			</div>

			<button class="btn-primary">

				更新

			</button>

		</div>

	</div>

</body>

</html>
